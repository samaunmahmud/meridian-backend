spring.application.name=meridian-backend
server.port=8080

# Reuse the same .env file Docker Compose uses — one source of truth for credentials
spring.config.import=optional:file:.env[.properties]

spring.datasource.url=jdbc:postgresql://localhost:5432/${POSTGRES_DB}
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}

# "update" auto-creates/alters tables from our entity classes — fine for learning.
# Real production apps use migration tools like Flyway instead; we'll flag that later.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true